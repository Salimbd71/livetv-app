name: Extract ZIP

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unzip:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: List files
        run: ls -la

      - name: Extract ZIP
        run: |
          for file in *.zip; do
            echo "Found $file"
            unzip "$file" -d extracted
          done

      - name: Copy files
        run: |
          cp -r extracted/. .

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "extract zip" || echo "no changes"
          git push
